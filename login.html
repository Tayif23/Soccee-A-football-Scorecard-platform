<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Patient Portal</title>
    <!-- Tailwind Core CDN Integration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth custom transitions on state updates */
        .state-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 antialiased min-h-screen">
    <div id="app" class="max-w-4xl mx-auto p-6">
        <!-- Components will be programmatically rendered here -->
    </div>
    
    <!-- Connect Interactive Script -->
    <script src="app.js"></script>
</body>
</html>
