<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCCEE - Platform</title>
    <!-- Tailwind CSS Integration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Cursor Transitions */
        .nav-link, .sub-link {
            transition: font-weight 0.2s ease, color 0.2s ease;
        }
        /* Custom Hover Rule: Putting cursor on any type of section makes it bold */
        .nav-link:hover, .sub-link:hover {
            font-weight: bold !important;
        }
        /* Active font rule for Top bar (Black background) links: changes to Yellow font */
        .top-active {
            color: #facc15 !important;
            font-weight: bold !important;
        }
        /* Active font rule for lower section tabs: changes to Red font */
        .lower-active {
            color: #ef4444 !important;
            font-weight: bold !important;
            border-bottom: 2px solid #ef4444;
        }
    </style>
</head>
<body class="bg-white text-gray-900 min-h-screen font-sans">

    <!-- ====================================================================== -->
    <!-- SECTION 1: LOGIN / REGISTER DASHBOARD (Based on Image 2.png) -->
    <!-- ====================================================================== -->
    <div id="auth-section" class="flex min-h-screen items-center justify-center bg-gray-50 p-4">
        <div class="w-full max-w-5xl bg-white rounded-3xl shadow-xl overflow-hidden grid grid-cols-1 md:grid-cols-2 p-4 md:p-8 gap-8 border border-gray-100">
            
            <!-- Left Panel Form Fields Workspace -->
            <div class="flex flex-col justify-center px-4 md:px-12 py-6">
                <div class="text-center mb-6">
                    <!-- Green marked area replaced cleanly with SOCCEE branding text -->
                    <div class="text-5xl font-black text-purple-600 tracking-wider mb-4">SOCCEE</div>
                    <h2 id="auth-title" class="text-2xl font-bold text-gray-800">Welcome Back!</h2>
                    <p id="auth-subtitle" class="text-sm text-gray-500 mt-1">Please Sign In to continue</p>
                </div>

                <!-- Dynamic Error/Success Notification Container -->
                <div id="auth-alert" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl font-semibold text-center"></div>

                <form id="auth-form" class="space-y-4" novalidate>
                    <!-- JavaScript dynamically modifies input tags based on toggle choice -->
                    <div id="dynamic-inputs" class="space-y-4"></div>

                    <!-- Blue marked area ("Remember me" and "Forgot Password") fully removed -->

                    <button type="submit" id="auth-submit-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3.5 rounded-xl transition duration-200 shadow-md">
                        Login
                    </button>
                </form>

                <p class="text-center text-sm text-gray-500 mt-6" id="toggle-auth-container">
                    Not a member? <a href="#" id="switch-to-register" class="text-purple-600 font-bold underline">Register Now</a>
                </p>
            </div>

            <!-- Right Panel Workspace Illustration Layout -->
            <div class="hidden md:flex items-center justify-center bg-purple-50 rounded-2xl p-6">
                <img src="https://illustrations.popsy.co/purple/searching-for-password.svg" id="custom-auth-img" class="w-4/5 h-auto object-contain" alt="Security Panel Vector">
            </div>
        </div>
    </div>


    <!-- ====================================================================== -->
    <!-- SECTION 2: MAIN WEBSITE VIEWPOINT (Based on Image 1.png) -->
    <!-- ====================================================================== -->
    <div id="main-viewport" class="hidden min-h-screen bg-white">
        
        <!-- Top Black Navigation Bar -->
        <header class="bg-black text-white">
            <!-- White Marked Area: "SOCCEE" replaces "FIFA" branding layout -->
            <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between border-b border-gray-800">
                <div class="text-3xl font-black tracking-wider text-white">SOCCEE</div>
                <button id="logout-btn" class="bg-gray-900 hover:bg-gray-800 border border-gray-700 text-gray-300 text-xs font-bold px-4 py-2 rounded-xl transition">
                    Logout
                </button>
            </div>

            <!-- Yellow Marked Area Navbar Options -->
            <!-- Orange Marked Area completely removed from layout -->
            <div class="max-w-7xl mx-auto px-4 py-3 flex space-x-8 text-xs font-bold uppercase tracking-widest overflow-x-auto scrollbar-none">
                <button id="top-tab-matches" class="nav-link top-active whitespace-nowrap">Matches</button>
                <button id="top-tab-table" class="nav-link whitespace-nowrap">Table</button>
                <button id="top-tab-teams" class="nav-link whitespace-nowrap">All Team Information</button>
                <button id="top-tab-more" class="nav-link whitespace-nowrap">More</button>
            </div>
        </header>

        <!-- Dynamic Header Sub-Bar Panel -->
        <div class="bg-gray-50 border-b border-gray-200 py-4">
            <div class="max-w-7xl mx-auto px-4 flex items-center justify-between flex-wrap gap-2">
                <!-- Pink Marked Area transformed text -->
                <span class="text-sm font-black text-gray-700 tracking-wider uppercase">A Scorecard Platform</span>
                
                <!-- Black Marked Area logo removed, displaying stage text description directly -->
                <div id="tournament-stage-text" class="text-xs font-black bg-black text-white px-4 py-2 rounded-full uppercase tracking-wider">
                    Quarter Final
                </div>
            </div>
        </div>

        <!-- Scoreboard Presentation Workspace -->
        <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
            
            <!-- Red Marked Area: Focus Match Center Component Grid -->
            <section class="bg-white rounded-3xl border border-gray-200 shadow-sm p-6 md:p-10 max-w-4xl mx-auto">
                <div class="text-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">FIFA World Cup 2026 Match Feed</div>
                <div class="grid grid-cols-3 items-center text-center">
                    <!-- Team Home -->
                    <div class="text-xl md:text-3xl font-black text-gray-800" id="live-team-a">Argentina</div>
                    
                    <!-- Live Goals Output Display -->
                    <div class="flex flex-col items-center">
                        <div class="text-4xl md:text-6xl font-black text-gray-900 tracking-tighter" id="live-goals-score">2 - 0</div>
                        <span class="text-[10px] bg-red-100 text-red-600 font-bold tracking-widest px-2 py-0.5 rounded-full mt-2 animate-pulse">LIVE</span>
                    </div>

                    <!-- Team Away -->
                    <div class="text-xl md:text-3xl font-black text-gray-800" id="live-team-b">Austria</div>
                </div>

                <!-- Scorers & Match Minute Lists (Positioned Under the Score) -->
                <div class="mt-8 pt-6 border-t border-gray-100 grid grid-cols-2 gap-4 text-xs text-gray-500">
                    <div id="live-scorers-team-a" class="text-left space-y-1 font-semibold pr-4 border-r border-gray-100">
                        <!-- Instantiated by JS logic stream -->
                    </div>
                    <div id="live-scorers-team-b" class="text-right space-y-1 font-semibold pl-4">
                        <!-- Instantiated by JS logic stream -->
                    </div>
                </div>
            </section>

            <!-- Lower Layout Tab Section Containers -->
            <section class="bg-white rounded-3xl border border-gray-200 shadow-sm overflow-hidden max-w-4xl mx-auto">
                <!-- Green Marked Area Custom Action Tabs Row List -->
                <div class="bg-gray-50 border-b border-gray-200 flex px-6 space-x-8 text-xs font-bold uppercase tracking-wider">
                    <button id="green-tab-stats" class="sub-link lower-active py-4">Stats</button>
                    <button id="green-tab-lineups" class="sub-link py-4">Lineups</button>
                    <button id="green-tab-players" class="sub-link py-4">Player Information</button>
                </div>

                <!-- Purple Area Component Block Content Wrapper -->
                <div id="purple-dynamic-canvas" class="p-6 md:p-8 min-h-[250px]">
                    <!-- Displayed Context templates run cleanly here -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
